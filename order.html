<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Order</title>
        <link rel="stylesheet" type="text/css" href="style.css">
    </head>

    <body>
        <h1>Blush n Crumb Bakery</h1>

        <h3>Place Your Order</h3>

        <hr>
        <nav>
        <a href="index.html">Home</a>
        <a href="products.html">Products</a>
        <a href="gallery.html">Gallery</a>
        <a href="order.html">Order</a>
        <a href="contact.html">Contact</a>

        <hr>

        <h2>Order Form</h2>

        <form>
            <label>Full Name:</label><br>
            <input type="text"><br><br>

            <label>Email Address:</label><br>
            <input type="email"><br><br>

            <label>Phone Number:</label><br>
            <input type="tel"><br><br>

            <label>Select Product:</label><br>
            <select>
                <option value="blueberry-cheesecake">Blueberry Cheesecake</option>
                <option value="cinnamon-rolls">Cinnamon Rolls</option>
                <option value="chocolate-croissants">Chocolate Croissants</option>
                <option value="salted-caramel-cake">Salted Caramel Cake</option>
                <option value="chocolate-chip-cookies">Classic Chocolate Chip Cookies</option>
                <option value="red-velvet-cupcakes">Red Velvet Cupcakes</option>
            </select><br><br>

            <label>Collection Date:</label><br>
            <input type="date"><br><br>

            <label>Collection Time:</label><br>
            <input type="time"><br><br>

            <label>Special Instructions:</label><br>
            <textarea></textarea><br><br>

            <input type="submit" value="Place Order">
        </form>
        <footer>
        <p>
            2026 Blush n Crumb Bakery. Comfort in Every Bite
        </p>
    </footer>
    </body>
</html>
